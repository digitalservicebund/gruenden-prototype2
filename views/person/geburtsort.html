<div class="kern-stack">
  {{> progress step=3 max=7 section="Persönliche Angaben"}}
  <div>
    <h2 class="kern-heading-x-large">Wo wurden Sie geboren?</h2>
  </div>
  <form
    class="kern-stack kern-gap-xl"
    action="/person/staatsangehoerigkeit"
    method="post"
  >
    <div class="kern-fieldset__body">
      <div class="kern-form-input">
        <label class="kern-label" for="geburtsort">Geburtsort</label>
        <input
          class="kern-form-input__input"
          id="geburtsort"
          name="geburtsort"
          type="text"
          value="{{ session.geburtsort }}"
        />
      </div>
      <div class="kern-form-input">
        <label class="kern-label" for="geburtsland">Geburtsland</label>
        <input
          class="kern-form-input__input"
          id="geburtsland"
          name="geburtsland"
          type="text"
          value="{{ session.geburtsland }}"
        />
      </div>
    </div>
    <div class="kern-btn-wrapper">
      <button class="kern-btn kern-btn--primary">
        <span class="kern-label">Weiter</span>
      </button>
    </div>
  </form>
</div>
