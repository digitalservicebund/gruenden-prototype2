<div class="kern-stack">
  {{> progress step=4 max=7}}
  <div>
    <h2 class="kern-heading-x-large">
      Haben Sie eine deutsche Staatsangehörigkeit?
    </h2>
  </div>
  <form action="/person/adresse" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="staatsangehoerigkeit-ja"
          type="radio"
          value="ja"
          name="staatsangehoerigkeitbool"
          checked
        /><label class="kern-label" for="staatsangehoerigkeit-ja">Ja</label>
      </div>
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="staatsangehoerigkeit-nein"
          type="radio"
          value="nein"
          name="staatsangehoerigkeitbool"
        /><label class="kern-label" for="staatsangehoerigkeit-nein">Nein</label>
      </div>
      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
