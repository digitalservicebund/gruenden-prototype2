<div class="kern-stack">
  {{> progress step=6 max=7 section="Persönliche Angaben"}}
  <div>
    <h2 class="kern-heading-x-large">Wo wohnen Sie?</h2>
  </div>
  <form class="kern-stack kern-gap-xl" action="/person/steuer-id" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-flex kern-flex-wrap kern-gap-md">
        <div class="kern-form-input kern-flex-grow">
          <label class="kern-label" for="strasse">Straße</label>
          <input
            class="kern-form-input__input"
            id="strasse"
            name="strasse"
            type="text"
            value="{{ session.strasse }}"
          />
        </div>
        <div
          class="kern-form-input kern-flex-shrink-0 kern-w-"
          style="width: 8rem"
        >
          <label class="kern-label" for="hausnummer">Hausnummer</label>
          <input
            class="kern-form-input__input"
            id="hausnummer"
            name="hausnummer"
            type="text"
            value="{{ session.hausnummer }}"
          />
        </div>
      </div>

      <div class="kern-flex kern-flex-wrap kern-gap-md">
        <div
          class="kern-form-input kern-flex-shrink-0 kern-w-"
          style="width: 12rem"
        >
          <label class="kern-label" for="plz">Postleitzahl</label>
          <input
            class="kern-form-input__input"
            id="plz"
            name="plz"
            type="text"
            value="{{ session.plz }}"
          />
        </div>
        <div class="kern-form-input kern-flex-grow">
          <label class="kern-label" for="ort">Ort</label>
          <input
            class="kern-form-input__input"
            id="ort"
            name="ort"
            type="text"
            value="{{ session.ort }}"
          />
        </div>
      </div>
    </div>
    <div class="kern-btn-wrapper">
      <button class="kern-btn kern-btn--primary">
        <span class="kern-label">Weiter</span>
      </button>
    </div>
  </form>
</div>
