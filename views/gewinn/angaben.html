<div class="kern-stack">
  <h2 class="kern-heading-x-large">Angaben Gewinn</h2>
  <p class="kern-body kern-body--large">Bitte überprüfen Sie Ihre Angaben</p>
  <div class="kern-summary-group">
    <div class="kern-summary">
      <div class="kern-summary__body">
        <dl class="kern-description-list">
          <div class="kern-description-list-item">
            <dt class="kern-description-list-item__key">Gewinn dieses Jahr</dt>
            <dd class="kern-description-list-item__value">
              {{session.gewinnDiesesJahr}}
            </dd>
          </div>
          <div class="kern-description-list-item">
            <dt class="kern-description-list-item__key">
              Gewinn nächstes Jahr
            </dt>
            <dd class="kern-description-list-item__value">
              {{session.gewinnNaechstesJahr}}
            </dd>
          </div>
        </dl>
        <div class="kern-summary__actions">
          <a href="/gewinn/eingabe" class="kern-link" aria-describedby="title">
            <span class="kern-icon kern-icon--edit" aria-hidden="true"></span>
            Bearbeiten
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="kern-summary-group">
    <div class="kern-summary">
      <div class="kern-summary__body">
        <dl class="kern-description-list">
          <div class="kern-description-list-item">
            <dt class="kern-description-list-item__key">Sonstige Einkünfte</dt>
            <dd class="kern-description-list-item__value">
              <ul class="kern-list kern-list-bullet">
                {{#each session.einkuenfte}}
                <li>{{this}}</li>
                {{/each}}
              </ul>
            </dd>
          </div>
        </dl>
        <div class="kern-summary__actions">
          <a
            href="/einkuenfte/auswahl"
            class="kern-link"
            aria-describedby="title"
          >
            <span class="kern-icon kern-icon--edit" aria-hidden="true"></span>
            Bearbeiten
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="kern-btn-wrapper">
    <a href="/kontakt/start" class="kern-btn kern-btn--primary">
      <span class="kern-label">Weiter</span>
    </a>
  </div>
</div>
