<span class="tree-link-status">
  {{#if active}}
  <span
    class="status--active kern-icon kern-icon--arrow-forward kern-icon--small"
    aria-hidden="true"
  ></span>
  {{else}} {{#if started}} {{#unless done}}
  <span
    class="status--started kern-icon kern-icon--in-progress kern-icon--small"
    aria-hidden="true"
  ></span>
  {{/unless}} {{/if}} {{#if done}}
  <span
    class="status--done kern-icon kern-icon--success kern-icon--small"
    aria-hidden="true"
  ></span>
  {{/if}} {{/if}}
</span>
