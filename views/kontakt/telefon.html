<div class="kern-stack">
  {{> progress step=1 max=2 section="Kontaktdaten"}}
  <div>
    <h2 class="kern-heading-x-large">Wie lautet Ihre Telefonnummer?</h2>
    <p class="kern-body">
      Ein Anruf ist der schnellste Weg, um Unklarheiten direkt zu klären.
    </p>
  </div>
  <form class="kern-stack kern-gap-xl" action="/kontakt/telefon" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-input">
        <label class="kern-label" for="steuerid">Telefon</label>
        <input
          class="kern-form-input__input"
          id="kontakt-telefon"
          name="kontaktTelefon"
          type="text"
          value="{{ session.kontaktTelefon }}"
        />
      </div>
    </div>
    <div class="kern-btn-wrapper">
      <button class="kern-btn kern-btn--primary">
        <span class="kern-label">Weiter</span>
      </button>
    </div>
  </form>
</div>
