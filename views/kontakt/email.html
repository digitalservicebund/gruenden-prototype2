<div class="kern-stack">
  {{> progress step=2 max=2 section="Kontaktdaten"}}
  <div>
    <h2 class="kern-heading-x-large">Wie lautet Ihre Email-Adresse?</h2>
    <p class="kern-body">
      Die E-Mail wird genutzt, falls Sie telefonisch nicht erreichbar sind.
    </p>
  </div>
  <form class="kern-stack kern-gap-xl" action="/kontakt/email" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-input">
        <label class="kern-label" for="steuerid">Email-Adresse</label>
        <input
          class="kern-form-input__input"
          id="kontakt-telefon"
          name="kontaktEmail"
          type="text"
          value="{{ session.kontaktEmail }}"
        />
      </div>
      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
