<div class="kern-stack">
  {{> progress step=1 max=7}}
  <div>
    <h2 class="kern-heading-x-large">
      Wie hoch wird Ihr geschätzter Umsatz sein?
    </h2>
    <p class="kern-body">
      Der Umsatz ist der gesamte Erlös, den Sie für Ihre Leistungen oder Waren
      erhalten, exklusive Mehrwertsteuer und ohne Berücksichtigung Ihrer Kosten.
    </p>
  </div>
  <form action="/umsatz/kleinunternehmerregelung-moeglich" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-input">
        <label class="kern-label" for="umsatz-dieses-jahr"
          >Umsätze dieses Jahr</label
        >
        <div class="kern-input-group">
          <input
            class="kern-form-input__input"
            id="umsatz-dieses-jahr"
            name="umsatz-dieses-jahr"
            type="text"
            inputmode="numeric"
            value="{{ session.umsatzDiesesJahr }}"
          />
          <span class="kern-input-group-text">Euro</span>
        </div>
      </div>

      <div class="kern-form-input">
        <label class="kern-label" for="umsatz-naechstes-jahr"
          >Umsätze naechstes Jahr</label
        >
        <div class="kern-input-group">
          <input
            class="kern-form-input__input"
            id="umsatz-naechstes-jahr"
            name="umsatz-naechstes-jahr"
            type="text"
            inputmode="numeric"
            value="{{ session.umsatzNaechstesJahr }}"
          />
          <span class="kern-input-group-text">Euro</span>
        </div>
      </div>

      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
