<div class="kern-stack">
  {{> progress step=1 max=5}}
  <div>
    <h2 class="kern-heading-x-large">
      Wie lautet die Adresse Ihres Unternehmens?
    </h2>
  </div>
  <form class="kern-stack kern-gap-xl" action="/unternehmen/taetigkeit" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-input">
        <label class="kern-label" for="strasse">Straße</label>
        <input
          class="kern-form-input__input"
          id="strasse"
          name="unternehmenStrasse"
          type="text"
          value="{{ session.unternehmenStrasse }}"
        />
      </div>
      <div class="kern-form-input">
        <label class="kern-label" for="hausnummer">Hausnummer</label>
        <input
          class="kern-form-input__input"
          id="hausnummer"
          name="unternehmenHausnummer"
          type="text"
          value="{{ session.unternehmenHausnummer }}"
        />
      </div>
      <div class="kern-form-input">
        <label class="kern-label" for="plz">Postleitzahl</label>
        <input
          class="kern-form-input__input"
          id="plz"
          name="unternehmenPlz"
          type="text"
          value="{{ session.unternehmenPlz }}"
        />
      </div>
      <div class="kern-form-input">
        <label class="kern-label" for="ort">Ort</label>
        <input
          class="kern-form-input__input"
          id="ort"
          name="unternehmenOrt"
          type="text"
          value="{{ session.unternehmenOrt }}"
        />
      </div>
      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
