<div class="kern-stack">
  {{> progress step=4 max=5}}
  <div>
    <h2 class="kern-heading-x-large">Wollen Sie nebenberuflich gründen?</h2>
  </div>
  <form action="/unternehmen/ustid" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="nebengewerbe"
          type="radio"
          value="nebengewerbe"
          name="gewerbeart"
          {{#if nebengewerbe}}checked{{/if}}
        /><label class="kern-label" for="nebengewerbe">Ja</label>
      </div>
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="hauptgewerbe"
          type="radio"
          value="hauptgewerbe"
          name="gewerbeart"
          {{#unless nebengewerbe}}checked{{/unless}}
        /><label class="kern-label" for="hauptgewerbe">Nein</label>
      </div>
      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
