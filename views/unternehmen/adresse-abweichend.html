<div class="kern-stack">
  {{> progress step=1 max=5 section="Unternehmen und Tätigkeit"}}
  <div>
    <h2 class="kern-heading-x-large">
      Ist der Sitz Ihres Unternehmens an ihrer privaten Adresse?
    </h2>
  </div>
  <form
    class="kern-stack kern-gap-xl"
    action="/unternehmen/adresse-eingabe"
    method="post"
  >
    <div class="kern-fieldset__body">
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="adresse-abweichend-nein"
          type="radio"
          value="nein"
          checked
          name="adresseAbweichend"
        /><label class="kern-label" for="adresse-abweichend-nein">Ja</label>
      </div>
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="adresse-abweichend-ja"
          type="radio"
          value="ja"
          name="adresseAbweichend"
        /><label class="kern-label" for="adresse-abweichend-ja"
          >Nein, mein Unternehmen hat eine andere Adresse</label
        >
      </div>
    </div>
    <div class="kern-btn-wrapper">
      <button class="kern-btn kern-btn--primary">
        <span class="kern-label">Weiter</span>
      </button>
    </div>
  </form>
</div>
