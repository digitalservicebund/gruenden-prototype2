<div class="kern-stack">
  {{> progress step=2 max=7}}
  <div>
    <h2 class="kern-heading-x-large">Haben Sie einen anderen Geburtsnamen?</h2>
  </div>

  <form class="kern-stack kern-gap-xl" action="/person/geburtsname/eingabe" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="geburtsname-ja"
          type="radio"
          value="ja"
          name="geburtsnamebool"
        /><label class="kern-label" for="geburtsname-ja">Ja</label>
      </div>
      <div class="kern-form-check">
        <input
          class="kern-form-check__radio"
          id="geburtsname-nein"
          type="radio"
          value="nein"
          name="geburtsnamebool"
          checked
        /><label class="kern-label" for="geburtsname-nein">Nein</label>
      </div>
      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
