<div class="kern-stack">
  {{> progress step=2 max=7}}
  <div>
    <h2 class="kern-heading-x-large">Wie lautet Ihr Geburtsname?</h2>
  </div>
  <form class="kern-stack kern-gap-xl" action="/person/geburtstag" method="post">
    <div class="kern-fieldset__body">
      <div class="kern-form-input">
        <label class="kern-label" for="geburtsname">Geburtsname</label>
        <input
          class="kern-form-input__input"
          id="geburtsname"
          name="geburtsname"
          type="text"
          value="{{ session.geburtsname }}"
        />
      </div>
      <div class="kern-btn-wrapper">
        <button class="kern-btn kern-btn--primary">
          <span class="kern-label">Weiter</span>
        </button>
      </div>
    </div>
  </form>
</div>
